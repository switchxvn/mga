name: Build and Push Containers

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'libs/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
              - 'tsconfig.base.json'
            backend:
              - 'apps/backend/**'
              - 'libs/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
              - 'tsconfig.base.json'
            api:
              - 'apps/api/**'
              - 'libs/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
              - 'tsconfig.base.json'
            admin:
              - 'apps/admin/**'
              - 'libs/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
              - 'tsconfig.base.json'
            nginx:
              - 'nginx/**'

      - name: Build matrix
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            frontend=true
            backend=true
            api=true
            admin=true
            nginx=true
          else
            frontend="${{ steps.changes.outputs.frontend }}"
            backend="${{ steps.changes.outputs.backend }}"
            api="${{ steps.changes.outputs.api }}"
            admin="${{ steps.changes.outputs.admin }}"
            nginx="${{ steps.changes.outputs.nginx }}"
          fi

          entries=()
          if [ "$frontend" = "true" ]; then
            entries+=('{"service":"frontend","dockerfile":"apps/frontend/Dockerfile"}')
          fi
          if [ "$backend" = "true" ]; then
            entries+=('{"service":"backend","dockerfile":"apps/backend/Dockerfile"}')
          fi
          if [ "$api" = "true" ]; then
            entries+=('{"service":"api","dockerfile":"apps/api/Dockerfile"}')
          fi
          if [ "$admin" = "true" ]; then
            entries+=('{"service":"admin","dockerfile":"apps/admin/Dockerfile"}')
          fi
          if [ "$nginx" = "true" ]; then
            entries+=('{"service":"nginx","dockerfile":"nginx/Dockerfile"}')
          fi

          if [ "${#entries[@]}" -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            joined=$(IFS=,; echo "${entries[*]}")
            echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: Production
    env:
      REGISTRY: ghcr.io
      APP_NAME: ${{ vars.APP_NAME != '' && vars.APP_NAME }}
      GITHUB_USERNAME: ${{ github.repository_owner }}
      ADMIN_HOST: localhost
      ADMIN_PORT: 4201
      ADMIN_API_BASE: http://localhost:3333
      ADMIN_ENV_FILE: .env
      FRONTEND_HOST: localhost
      FRONTEND_PORT: 4201
      FRONTEND_API_BASE: http://localhost:3333
      FRONTEND_ENV_FILE: .env
      BACKEND_ENV_FILE: .env.production
      BACKEND_FALLBACK_ENV: .env
      BACKEND_NODE_ENV: production
      BACKEND_PORT: 3333
      BACKEND_API_PREFIX: api
      BACKEND_FRONTEND_URL: http://localhost:4201
      API_ENV_FILE: .env.production
      API_FALLBACK_ENV: .env
      API_NODE_ENV: production
      API_PORT: 4000
      API_PREFIX: api
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Recreate .env from secret
        env:
          DOTENV_FILE: ${{ secrets.DOTENV_FILE }}
        shell: bash
        run: |
          if [ -z "$DOTENV_FILE" ]; then
            echo "DOTENV_FILE secret is empty or not set, skipping"
            exit 0
          fi
          printf "%s" "$DOTENV_FILE" > .env

      - name: Load configuration from .env
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo "::error::.env file not found in repository root"
            exit 1
          fi

          while IFS='=' read -r key value; do
            if [[ -z "$key" || "$key" =~ ^# ]]; then
              continue
            fi
            clean_key=$(echo "$key" | xargs)
            clean_value=$(echo "$value" | xargs)
            # Skip overriding values already provided through env/variables
            if printenv "$clean_key" >/dev/null 2>&1; then
              continue
            fi
            echo "$clean_key=$clean_value" >> "$GITHUB_ENV"
          done < <(grep -Ev '^(#|$)' .env)

      - name: Override credentials with repository secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.GHCR_USERNAME }}" ]; then
            echo "GITHUB_USERNAME=${{ secrets.GHCR_USERNAME }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "GHCR_PASSWORD=${{ secrets.GHCR_TOKEN }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GHCR_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          elif [ -n "$GITHUB_TOKEN" ]; then
            echo "GHCR_PASSWORD=$GITHUB_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Validate required environment
        shell: bash
        run: |
          missing=()
          for var in REGISTRY GITHUB_USERNAME APP_NAME GHCR_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required variables: ${missing[*]}"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GITHUB_USERNAME }}
          password: ${{ env.GHCR_PASSWORD }}

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION=$(git describe --tags --always)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: |
            ${{ matrix.service == 'frontend' && format('ENV_FILE={0}\nFRONTEND_HOST={1}\nFRONTEND_PORT={2}\nFRONTEND_API_BASE={3}', env.FRONTEND_ENV_FILE, env.FRONTEND_HOST, env.FRONTEND_PORT, env.FRONTEND_API_BASE) || '' }}
            ${{ matrix.service == 'admin' && format('ENV_FILE={0}\nADMIN_HOST={1}\nADMIN_PORT={2}\nADMIN_API_BASE={3}', env.ADMIN_ENV_FILE, env.ADMIN_HOST, env.ADMIN_PORT, env.ADMIN_API_BASE) || '' }}
            ${{ matrix.service == 'backend' && format('ENV_FILE={0}\nBACKEND_FALLBACK_ENV={1}\nBACKEND_NODE_ENV={2}\nBACKEND_PORT={3}\nBACKEND_API_PREFIX={4}\nBACKEND_FRONTEND_URL={5}', env.BACKEND_ENV_FILE, env.BACKEND_FALLBACK_ENV, env.BACKEND_NODE_ENV, env.BACKEND_PORT, env.BACKEND_API_PREFIX, env.BACKEND_FRONTEND_URL) || '' }}
            ${{ matrix.service == 'api' && format('ENV_FILE={0}\nAPI_FALLBACK_ENV={1}\nAPI_NODE_ENV={2}\nAPI_PORT={3}\nAPI_PREFIX={4}', env.API_ENV_FILE, env.API_FALLBACK_ENV, env.API_NODE_ENV, env.API_PORT, env.API_PREFIX) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/${{ env.APP_NAME }}-${{ matrix.service }}:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.GITHUB_USERNAME }}/${{ env.APP_NAME }}-${{ matrix.service }}:latest
