version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:4201"
    env_file:
      - apps/frontend/.env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    expose:
      - "3333"
    env_file:
      - apps/backend/.env
    environment:
      - NODE_ENV=production
      # Add other environment variables as needed
      # - DATABASE_URL=
      # - JWT_SECRET=
    networks:
      - app-network

networks:
  app-network:
    driver: bridge 