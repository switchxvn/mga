<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Elements -->
  <circle cx="400" cy="300" r="250" fill="#E5E7EB" fill-opacity="0.5"/>
  <circle cx="400" cy="300" r="200" fill="#F3F4F6" fill-opacity="0.5"/>
  
  <!-- Lock Icon -->
  <g transform="translate(300, 200)">
    <!-- Lock Body -->
    <rect x="0" y="100" width="200" height="150" rx="20" fill="#4F46E5"/>
    <rect x="60" y="100" width="80" height="100" rx="10" fill="#4F46E5"/>
    
    <!-- Lock Arch -->
    <path d="M60 100 C60 50, 140 50, 140 100" stroke="#4F46E5" stroke-width="20" fill="none"/>
    
    <!-- Key -->
    <circle cx="100" cy="175" r="20" fill="#F3F4F6"/>
    <rect x="100" y="175" width="40" height="10" rx="5" fill="#F3F4F6"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="150" r="20" fill="#4F46E5" fill-opacity="0.2"/>
  <circle cx="600" cy="450" r="30" fill="#4F46E5" fill-opacity="0.2"/>
  <circle cx="150" cy="400" r="25" fill="#4F46E5" fill-opacity="0.2"/>
  
  <!-- Text Elements -->
  <text x="400" y="500" text-anchor="middle" font-family="Arial" font-size="24" fill="#4F46E5" fill-opacity="0.5">
    Secure Authentication
  </text>
</svg> 