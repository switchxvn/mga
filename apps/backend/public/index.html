<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestJS API with tRPC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #3f51b5;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #3f51b5;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        .link:hover {
            background-color: #303f9f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NestJS API with tRPC Integration</h1>
        <p>
            Welcome to the NestJS API with tRPC integration. This server provides both REST API endpoints and tRPC procedures.
        </p>
        <p>
            Use the links below to access the API documentation or explore the available endpoints.
        </p>
        <div class="links">
            <a href="/api/docs" class="link">Swagger Documentation</a>
            <a href="/api" class="link">API Root</a>
            <a href="/trpc" class="link">tRPC Endpoint</a>
        </div>
    </div>
</body>
</html>
